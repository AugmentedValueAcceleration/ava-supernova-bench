name: secret-scan

# Fails the build if a secret is committed anywhere in history. Uses a pinned,
# checksum-verified gitleaks binary directly (no marketplace action, no license
# key) so it works the same on this public repo as on the private ones.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — catch a secret buried in any commit

      - name: Run gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          VERSION=8.30.1
          ASSET="gitleaks_${VERSION}_linux_x64.tar.gz"
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          curl -sSL "${BASE}/${ASSET}" -o "${ASSET}"
          curl -sSL "${BASE}/gitleaks_${VERSION}_checksums.txt" -o checksums.txt
          awk -v a="${ASSET}" '$2==a' checksums.txt | sha256sum -c -
          tar -xzf "${ASSET}" gitleaks
          ./gitleaks git . --no-banner -c .gitleaks.toml --redact --exit-code 1
